name: Push AlgoDat Hausaufgaben to TU-Berlin

on:
  push:
    branches:
      - main
    paths:
      - 'SoSe2026/AlgoDat/Hausufgaben/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force push (overwrites remote history)'
        required: false
        default: false
        type: boolean

jobs:
  push-algodat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config --global user.name "${{ secrets.GITLAB_NAME }}"
          git config --global user.email "${{ secrets.GITLAB_EMAIL }}"

      - name: Push AlgoDat folder to TU-Berlin repo
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          git subtree split --prefix SoSe2026/AlgoDat/Hausufgaben --branch algodat-subtree
          git push https://${{ secrets.GITLAB_USERNAME }}:${{ secrets.GITLAB_TOKEN }}@git.tu-berlin.de/algodat-sose-26/mahd.git algodat-subtree:main $FORCE_FLAG
